<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Travel Places</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* TOP BAR */
header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #111827;
}

input {
    padding: 8px;
    width: 200px;
}

/* LAYOUT */
.container {
    display: flex;
}

/* MAP */
#map {
    height: 100vh;
    width: 40%;
}

/* FEED */
.feed {
    width: 60%;
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.card {
    height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid #222;
    padding: 20px;
}

.card img {
    width: 80%;
    border-radius: 10px;
}

/* LOGIN */
.login {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #1f2937;
    padding: 20px;
    border-radius: 10px;
}
button {
    padding: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h3>Travel App</h3>
    <input id="search" placeholder="Поиск мест...">
    <button onclick="logout()">Выйти</button>
</header>

<div class="container">
    <div id="map"></div>

    <div class="feed" id="feed"></div>
</div>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <h3>Вход</h3>
    <input id="username" placeholder="Имя">
    <button onclick="login()">Войти</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ---------------- USERS ----------------
let user = localStorage.getItem("user");

function login() {
    let name = document.getElementById("username").value;
    if (!name) return;
    localStorage.setItem("user", name);
    location.reload();
}

function logout() {
    localStorage.removeItem("user");
    location.reload();
}

if (user) {
    document.getElementById("loginBox").style.display = "none";
}

// ---------------- MAP ----------------
let map = L.map('map').setView([40.5, 72.8], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

let places = [
    {name:"Парк", lat:40.5, lng:72.8, img:"https://picsum.photos/400/300?1"},
    {name:"Горы", lat:40.7, lng:72.6, img:"https://picsum.photos/400/300?2"},
    {name:"Озеро", lat:40.6, lng:72.9, img:"https://picsum.photos/400/300?3"},
];

// markers
places.forEach(p=>{
    L.marker([p.lat,p.lng]).addTo(map).bindPopup(p.name);
});

// ---------------- FEED ----------------
let feed = document.getElementById("feed");

function loadFeed(data){
    feed.innerHTML = "";
    data.forEach(p=>{
        feed.innerHTML += `
        <div class="card">
            <h2>${p.name}</h2>
            <img src="${p.img}">
            <p>Отзывы: ${user ? "Написать отзыв..." : "Войдите чтобы писать"}</p>
        </div>
        `;
    });
}
loadFeed(places);

// ---------------- SEARCH ----------------
document.getElementById("search").addEventListener("input", function(){
    let val = this.value.toLowerCase();
    let filtered = places.filter(p => p.name.toLowerCase().includes(val));
    loadFeed(filtered);
});
</script>

</body>
</html>
