<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relax Place</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    padding:20px;
    text-align:center;
    background:#111827;
    font-size:32px;
    font-weight:bold;
    letter-spacing:2px;
}

.main-slider{
    display:flex;
    overflow-x:auto;
    gap:20px;
    padding:20px;
}

.card{
    min-width:300px;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card-content h2{
    margin-bottom:10px;
}

.details{
    display:none;
    padding:30px;
    background:#111827;
}

.details.active{
    display:block;
}

.details img{
    width:100%;
    max-height:500px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:20px;
}

.info{
    margin-top:20px;
    line-height:1.8;
}

.reviews{
    margin-top:30px;
}

.review{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
}

.similar{
    margin-top:40px;
}

.similar-list{
    display:flex;
    gap:15px;
    overflow-x:auto;
    margin-top:15px;
}

.similar-card{
    min-width:220px;
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
}

.similar-card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.similar-card h4{
    padding:10px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<header>RELAX PLACE</header>

<!-- Главная лента -->
<div class="main-slider">

    <div class="card" onclick="openDetails(
        'Mountain Resort',
        'https://images.unsplash.com/photo-1506744038136-46273834b3fb',
        'Отличное место для отдыха в горах.',
        'ул. Горная 12',
        '09:00 - 23:00'
    )">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
        <div class="card-content">
            <h2>Mountain Resort</h2>
            <p>Горный отдых</p>
        </div>
    </div>

    <div class="card" onclick="openDetails(
        'Lake Hotel',
        'https://images.unsplash.com/photo-1507525428034-b723cf961d3e',
        'Красивый отель возле озера.',
        'ул. Озерная 8',
        '08:00 - 00:00'
    )">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
        <div class="card-content">
            <h2>Lake Hotel</h2>
            <p>Отдых возле озера</p>
        </div>
    </div>

    <div class="card" onclick="openDetails(
        'Forest Camp',
        'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee',
        'Тихое место среди леса.',
        'ул. Лесная 21',
        '10:00 - 22:00'
    )">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
        <div class="card-content">
            <h2>Forest Camp</h2>
            <p>Лесной отдых</p>
        </div>
    </div>

</div>

<!-- Подробности -->
<div class="details" id="details">

    <img id="detailImage" src="">
    <h1 id="detailTitle"></h1>

    <div class="info">
        <p id="detailText"></p>

        <p><strong>📍 Адрес:</strong> <span id="detailAddress"></span></p>

        <p><strong>🕒 Время работы:</strong> <span id="detailTime"></span></p>
    </div>

    <!-- Отзывы -->
    <div class="reviews">
        <h2>Отзывы</h2>

        <div class="review">
            ⭐⭐⭐⭐⭐ Очень красивое место!
        </div>

        <div class="review">
            ⭐⭐⭐⭐ Хороший сервис и атмосфера.
        </div>

        <div class="review">
            ⭐⭐⭐⭐⭐ Хочу приехать снова.
        </div>
    </div>

    <!-- Похожие -->
    <div class="similar">
        <h2>Похожие места</h2>

        <div class="similar-list">

            <div class="similar-card">
                <img src="https://images.unsplash.com/photo-1519046904884-53103b34b206">
                <h4>Beach Resort</h4>
            </div>

            <div class="similar-card">
                <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e">
                <h4>Green Valley</h4>
            </div>

            <div class="similar-card">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
                <h4>Nature Park</h4>
            </div>

        </div>
    </div>

    <button onclick="closeDetails()">Закрыть</button>

</div>

<script>
function openDetails(title, image, text, address, time){

    document.getElementById("details").classList.add("active");

    document.getElementById("detailTitle").innerText = title;
    document.getElementById("detailImage").src = image;
    document.getElementById("detailText").innerText = text;
    document.getElementById("detailAddress").innerText = address;
    document.getElementById("detailTime").innerText = time;

    window.scrollTo({
        top: document.getElementById("details").offsetTop,
        behavior: "smooth"
    });
}

function closeDetails(){
    document.getElementById("details").classList.remove("active");
}
</script>

</body>
</html>
